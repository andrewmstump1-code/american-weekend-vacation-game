<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>American Weekend Vacation – Fireworks Street Run</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Landing Page -->
  <div id="title-screen" class="screen">
    <h1>1-800-WINDOW-CLEANING</h1>
    <p class="landing-copy">
      To get your window cleaning quote, enter your email below.
    </p>
    <div id="email-form">
      <input id="email-input" type="email" placeholder="you@example.com" aria-label="Email address" />
      <button id="start-button">Get Quote & Play</button>
      <div id="email-error" class="error-message hidden"></div>
      <div id="email-success" class="success-message hidden"></div>
    </div>
    <button id="high-scores-button">High Scores</button>
    <div id="home-high-scores">
      <h2>Top Scores</h2>
      <ul id="home-high-scores-list"></ul>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen hidden">
    <div id="timer-display">Timer: 00:00</div>
    <canvas id="game-canvas" width="800" height="400"></canvas>
    <div id="hud">
      <span id="score-display">Score: 0</span>
      <span id="health-display">Health: 3</span>
    </div>
  </div>

  <!-- High Scores Screen -->
  <div id="high-scores-screen" class="screen hidden">
    <h2>High Scores</h2>
    <ul id="high-scores-list"></ul>
    <button id="back-to-title">Back to Title</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
